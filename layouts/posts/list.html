{{ define "main" }}

<h1 class="text-3xl font-bold mb-6">Blog</h1>

<ul class="space-y-6">
  {{ range .Pages }}
    <li>
      <a href="{{ .RelPermalink }}" class="text-xl text-blue-600 hover:underline">
        {{ .Title }}
      </a>
      <p class="text-sm text-gray-500">{{ .Date.Format "02.01.2006" }}</p>
    </li>
  {{ end }}
</ul>

{{ end }}
