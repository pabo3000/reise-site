{{ define "main" }}

<div class="max-w-2xl mx-auto mt-10">
  <h1 class="text-3xl font-bold mb-6">
    {{ .Title }}
  </h1>

  <ul class="space-y-4">
    {{ range .Pages }}
      <li>
        <a href="{{ .RelPermalink }}" class="text-blue-600 hover:underline">
          {{ .Title }}
        </a>
      </li>
    {{ end }}
  </ul>
</div>

{{ end }}
