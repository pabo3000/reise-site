<body class="bg-gray-100 text-gray-900">

  <header class="bg-white shadow">
    <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="{{ "/" | relURL }}" class="text-xl font-bold text-blue-600">
        Reise-Site
      </a>

      <nav class="space-x-6">
        <a href="{{ "/" | relURL }}" class="hover:text-blue-600">Home</a>
        <a href="{{ "/posts/" | relURL }}" class="hover:text-blue-600">Blog</a>
      </nav>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-10">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="text-center text-sm text-gray-500 py-6">
    © {{ now.Year }} Reise-Site
  </footer>

</body>
